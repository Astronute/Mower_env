
# 体坐标系
base_link_frame_id: base_footprint

# 世界坐标系
world_frame_id: odom

device_tty: "/dev/ttyUSB4"

# 串口发送数据的频率
tty_frequency: 20.0

# 消息订阅端口
zmq_sub_port0: tcp://127.0.0.1:5557

# 消息发布端口
zmq_pub_port: tcp://*:5556

####################################################################### subscribe #######################################################################
# 控制信号
ztwist: /cmd_vel

ztwist_sub_port: port0


####################################################################### covariance #######################################################################
# 根据轮速得到的线速度角速度
odom_twist_covariance: [
  1e6,  0,  0,  0,  0,  0,
  0,  1e6,  0,  0,  0,  0,
  0,  0,  1e6,  0,  0,  0,
  0,  0,  0,  1e6,  0,  0,
  0,  0,  0,  0,  1e6,  0,
  0,  0,  0,  0,  0,  1e6
]

imu_odom_covariance: [
  1e6,  0,  0,  0,  0,  0,
  0,  1e6,  0,  0,  0,  0,
  0,  0,  1e6,  0,  0,  0,
  0,  0,  0,  1e6,  0,  0,
  0,  0,  0,  0,  1e6,  0,
  0,  0,  0,  0,  0,  1e6
]

