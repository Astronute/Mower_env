syntax = "proto3";

package geometry_msgs;

import "std_msgs/header.proto";
import "geometry_msgs/vector3.proto";


message Twist{
    geometry_msgs.Vector3 linear = 1;

    geometry_msgs.Vector3 angular = 2;
}

message TwistStamped{
    std_msgs.Header header = 1;

    geometry_msgs.Twist twist = 2;
}

message TwistWithCovariance{
    geometry_msgs.Twist twist = 1;

    repeated double covariance = 2;
}

message TwistWithCovarianceStamped{
    std_msgs.Header header = 1;

    geometry_msgs.TwistWithCovariance twist = 2;
}