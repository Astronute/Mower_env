syntax = "proto3";

package pnc_msgs;

import "std_msgs/header.proto";

message MotionOutSignal{
    std_msgs.Header header = 1;

    int32 id = 2;

    string name = 3;

    double rsv_0 = 4; // x

    double rsv_1 = 5; // y

    double rsv_2 = 6; // yaw

    double rsv_3 = 7; // s

    double rsv_4 = 8;

    double rsv_5 = 9;

    double rsv_6 = 10;

    double rsv_7 = 11;
}